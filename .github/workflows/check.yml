# Save this file in your repo at: .github/workflows/check.yml
name: Check Pararius

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub may delay to ~10-15 min at busy times)
  workflow_dispatch:          # lets you trigger it manually from the Actions tab

permissions:
  contents: write             # needed to commit seen.json back to the repo

concurrency:
  group: pararius-check
  cancel-in-progress: false   # never run two checks at once (protects seen.json)

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Save seen listings
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json || true
          git diff --cached --quiet || git commit -m "update seen listings [skip ci]"
          git pull --rebase origin main || true
          git push
